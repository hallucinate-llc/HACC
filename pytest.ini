[pytest]
markers =
    performance: Performance and optimization tests
    benchmark: Benchmark performance tests
    communications_smoke: Lightweight end-to-end communications ingest smoke tests

filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:processors\.pdf_processing is deprecated\..*:DeprecationWarning
    ignore:processors\.graphrag_integrator is deprecated\..*:DeprecationWarning
    ignore:processors\.multimodal_processor is deprecated\..*:DeprecationWarning
    ignore:ipfs_datasets_py\.utils\.query_cache is deprecated\..*:DeprecationWarning
    ignore:The knowledge_graph_extraction module is deprecated\..*:DeprecationWarning
    ignore:PyPDF2 is deprecated\. Please move to the pypdf library instead\.:DeprecationWarning
