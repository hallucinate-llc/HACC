    <script type="9d451b7f56e0efbb3a1398b2-text/javascript">
  localStorage['heap-id'] = '1566116007';

  /**
   * Generates a RFC4122 version 4 compliant UUID
   * @returns {string}
   */
  const generateUuid4 = function () {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
      // eslint-disable-next-line no-bitwise
      const r = (Math.random() * 16) | 0;
      // eslint-disable-next-line no-bitwise
      const v = c === 'x' ? r : (r & 0x3) | 0x8;
      return `${v.toString(16)}`;
    });
  };

  /**
   * Extracts a value from a cookie
   * @param {string} cookieName
   * @returns {undefined | string}
   */
  const getValueFromCookie = function (cookieName) {
    const cookies = document.cookie.split(';');

    for (let i = 0; i < cookies.length; i += 1) {
      const cookie = cookies[i].trim();
      if (cookie.startsWith(`${cookieName}=`)) {
        return cookie.substring(`${cookieName}=`.length, cookie.length);
      }
    }
    return undefined;
  };

  /**
   * @param {string} cookieName
   * @param {string} value
   */
  const setCookie = function (cookieName, value) {
    const secure = window.location.protocol === 'https:' ? '; Secure' : '';
    document.cookie = `${cookieName}=${value}; path=/; SameSite=Lax${secure}`;
  };

  /**
   * Gets a UUID from cookie or generates a new one if not found
   * @param {string} cookieName - Name of the cookie to check
   * @returns {string} UUID from cookie or newly generated
   */
  const getOrCreateSessionId = function (cookieName) {
    const cookieValue = getValueFromCookie(cookieName)
    if (cookieValue) {
      return cookieValue
    } else {
      const newSessionId = generateUuid4();
      setCookie(cookieName, newSessionId);
      return newSessionId;
    }
  };
  localStorage['classy-session-id'] = getOrCreateSessionId('classy-session-id');

</script>
